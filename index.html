<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --brand-green: #004b39;
            --brand-gold: #c5a358;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .banner-card {
            position: relative;
            width: 100%;
            max-width: 100%; /* ให้ขยายเต็มจอตามรูป */
            margin: 0 auto;
            line-height: 0;
        }

        .image-container {
            position: relative;
            width: 100%;
            display: inline-block;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* กลุ่มปุ่ม: ใช้ % เพื่อให้ตำแหน่งคงที่ตามการย่อขยายของรูป */
        .action-group {
            position: absolute;
            bottom: 5%; /* ปรับค่า % ตรงนี้เพื่อให้ตรงกับแถบสีดำในรูปของคุณ */
            left: 50%;
            transform: translateX(-50%);
            
            display: flex;
            flex-direction: row; /* เรียงแถวเดียวกันเสมอ */
            gap: 2%; /* ระยะห่างแบบ % เพื่อให้หดตามจอ */
            width: 90%; /* ความกว้างกลุ่มปุ่มสัมพันธ์กับรูป */
            max-width: 900px;
            justify-content: center;
            line-height: normal;
        }

        .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* ใช้หน่วย vw (view width) หรือ % เพื่อให้ขนาดปุ่มย่อตามจอ */
            padding: 3.5% 2%; 
            font-size: clamp(21px, 2vw, 25px); /* ตัวอักษรหดได้แต่ไม่เล็กเกินไป */
            
            color: var(--white);
            background-color: var(--brand-green);
            text-decoration: none;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap; /* ป้องกันตัวอักษรตกบรรทัด */
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: var(--brand-gold);
        }

        /* ปรับแต่งสำหรับมือถือเล็กพิเศษ */
        @media (max-width: 480px) {
            .action-group {
                bottom: 4%; /* ขยับขึ้นลงตามสัดส่วนพื้นที่ดำในมือถือ */
                gap: 5px;
            }
            .btn {
                padding: 8px 5px;
                letter-spacing: 0;
            }
        }
    </style>
</head>
<body>

    <div class="banner-card">
        <div class="image-container">
            <img src="(MAR)One-Touch-Flawless-Fit_Banner.jpg" alt="Covermark Banner">
            
            <div class="action-group">
                <a class="btn" href="https://intranet-occ.com/Covermark/index.php?idcampaign=65">13 Mar - 30 Apr 2026</a>
                <a class="btn" href="https://intranet-occ.com/Covermark/index.php?idcampaign=66">16 Mar - 30 Apr 2026</a>
            </div>
        </div>
    </div>

</body>
</html>
