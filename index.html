<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --brand-green: #004b39; 
            --brand-gold: #c5a358;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Container หลัก ปรับตามความกว้างหน้าจอ */
        .banner-card {
            position: relative;
            width: 100%;
            margin: 0 auto;
            line-height: 0; /* ป้องกันช่องว่างใต้รูปภาพ */
        }

        /* ตัวครอบรูปภาพ - ไม่ Fix สัดส่วนแล้ว */
        .image-container {
            position: relative;
            width: 100%;
            height: auto;
        }

        .image-container img {
            width: 100%;
            height: auto; /* ให้สูงตามสัดส่วนจริงของไฟล์รูปภาพ */
            display: block;
        }

        /* กลุ่มปุ่มที่ทับอยู่บนรูปภาพ */
        .action-group {
            position: absolute;
            bottom: 5%; /* ระยะห่างจากขอบล่างของรูป */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            width: 90%;
            max-width: 600px;
            flex-direction: column; /* Mobile: แนวตั้ง */
            line-height: normal; /* คืนค่า line-height ให้ตัวอักษร */
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            font-size: clamp(0.75rem, 3vw, 0.9rem);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: var(--brand-green);
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn:hover {
            background-color: var(--brand-gold);
        }

        /* --- Responsive สำหรับหน้าจอใหญ่ --- */
        @media (min-width: 768px) {
            .action-group {
                flex-direction: row; /* Desktop: แนวนอน */
                bottom: 8%; /* ขยับตำแหน่งขึ้นตามความเหมาะสมของจอใหญ่ */
                max-width: 800px;
            }

            .btn {
                flex: 1; /* ให้ปุ่มกว้างเท่ากันในแนวนอน */
                padding: 18px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="banner-card">
        <div class="image-container">
            <img src="(MAR)One-Touch-Flawless-Fit_Banner.jpg" alt="Covermark Banner">
            
            <div class="action-group">
                <a class="btn">13 Mar - 30 Apr 2026</a>
                <a class="btn">16 Mar - 30 Apr 2026</a>
            </div>
        </div>
    </div>

</body>
</html>
