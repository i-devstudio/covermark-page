<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --brand-green: #004b39;
            --brand-gold: #c5a358;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
        }

        .banner-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            line-height: 0;
        }

        .banner-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* กลุ่มปุ่ม: ขยายให้กว้างขึ้นและปรับตำแหน่ง */
        .action-overlay {
            position: absolute;
            bottom: 3%; /* ปรับลงมานิดหน่อยเพื่อให้ปุ่มที่ใหญ่ขึ้นไม่ไปทับโลโก้ */
            left: 50%;
            transform: translateX(-50%);
            width: 96%; /* แผ่เกือบชิดขอบรูป */
            
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px; /* เพิ่มระยะห่างระหว่างปุ่ม */
            line-height: normal;
        }

        .btn {
            background-color: var(--brand-green);
            color: var(--white);
            text-decoration: none;
            text-align: center;
            font-weight: 700; /* ปรับตัวหนาขึ้น */
            
            /* ปรับขนาดตัวอักษรให้ใหญ่ขึ้น (Min 11px, Max 18px) */
            font-size: clamp(15px, 3.5vw, 21px);
            
            /* เพิ่มความหนาของปุ่ม */
            padding: 21px 5px; 
            
            border: 1px solid rgba(255,255,255,0.3);
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background-color: var(--brand-gold);
        }

        /* สำหรับหน้าจอ Desktop */
        @media (min-width: 768px) {
            .action-overlay {
                width: 90%;
                gap: 20px;
                bottom: 5%;
            }
            .btn {
                padding: 22px 30px; /* ปุ่มใหญ่สะใจบนจอใหญ่ */
                font-size: 20px;
                border-width: 2px;
            }
        }

        /* กรณีจอมือถือเล็กมากจริงๆ */
        @media (max-width: 380px) {
            .action-overlay {
                gap: 5px;
            }
            .btn {
                padding: 12px 2px;
                letter-spacing: -0.5px; /* บีบตัวอักษรนิดหน่อยเพื่อไม่ให้ล้นปุ่ม */
            }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <img src="(MAR)One-Touch-Flawless-Fit_Banner.jpg" alt="Covermark Banner">
        
        <div class="action-overlay">
            <a href="https://intranet-occ.com/Covermark/index.php?idcampaign=65" class="btn">13 MAR - 30 APR 2026</a>
            <a href="https://intranet-occ.com/Covermark/index.php?idcampaign=66" class="btn">16 MAR - 30 APR 2026</a>
        </div>
    </div>

</body>
</html>
